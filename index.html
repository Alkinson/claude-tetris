<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay">
      <div class="overlay-box">

        <!-- Pantalla de inicio -->
        <div id="start-content">
          <p class="overlay-title-text">TETRIS</p>
          <div id="highscores-start"></div>
          <button id="play-btn">Jugar</button>
          <button id="reset-scores-btn">Resetear records</button>
        </div>

        <!-- Pausa -->
        <div id="pause-content" class="hidden">
          <p class="overlay-title-text">PAUSA</p>
          <button id="resume-btn">Continuar</button>
        </div>

        <!-- Game over -->
        <div id="gameover-content" class="hidden">
          <p id="overlay-title">GAME OVER</p>
          <p id="overlay-score"></p>
          <div id="name-entry" class="hidden">
            <input type="text" id="player-name" placeholder="Tu nombre" maxlength="20" />
            <button id="save-score-btn">Guardar</button>
          </div>
          <div id="highscores-gameover"></div>
          <button id="restart-btn">Jugar de nuevo</button>
          <button id="reset-scores-btn-gameover">Resetear records</button>
        </div>

      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
